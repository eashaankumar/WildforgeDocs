site_name: Wildforge Engine
site_description: Documentation for the Wildforge Engine
theme:
  name: material

  logo: assets/wildforge-logo.png
  favicon: assets/wildforge-logo.png

  palette:

    # Dark mode
    - scheme: slate
      primary: black
      accent: lime
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

    # Light mode
    - scheme: default
      primary: green
      accent: lime
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

# extra_css:
#   - stylesheets/extra.css

nav:
  - Home: index.md
  - Inputs: Inputs/Input.md
  - Math:
      - FastNoiseLite: Math/FastNoiseLite.md
      - RectTransform: Math/RectTransform.md
      - Color: Math/Color.md
      - Rect2D: Math/Rect2D.md
      - Transform: Math/Transform.md
  - Memory:
      - UnmanagedList: Memory/UnmanagedList.md
      - UnmanagedStack: Memory/UnmanagedStack.md
  - Physics:
      - PhysicsSimulationManager: Physics/PhysicsSimulationManager.md
  - Rendering:
      - RenderPass: Rendering/RenderPass.md
      - Raytracing Renderer Roadmap: Rendering/RaytracingRendererRoadmap.md
      - Compute:
